<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Compass" />
  <title>Compass</title>
  <style>
    :root {
      --bg-deep: #0b1520;
      --bg-mid: #1a2a35;
      --border: #2e4055;
      --gold: #c8a96e;
      --gold-dim: #c8a96e40;
      --text-main: #d8e8f0;
      --text-muted: #8a9baa;
      --text-dim: #3a5568;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: Georgia,'Times New Roman',serif; background: var(--bg-deep); min-height:100vh; color:var(--text-main); overflow:hidden; }

    /* LOCK */
    #lock-screen { position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,#0b1520 0%,#1a2a35 50%,#0b1520 100%);z-index:999;padding:2rem;gap:0; }
    .lock-icon { font-size:3rem;margin-bottom:1rem; }
    .badge { display:flex;align-items:center;gap:0.5rem;margin-bottom:0.8rem; }
    .gold-dot { width:7px;height:7px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#e8c87a);box-shadow:0 0 8px #c8a96e70; }
    .badge-text { font-size:0.65rem;letter-spacing:0.22em;color:var(--gold);text-transform:uppercase; }
    .lock-title { font-size:2.6rem;font-weight:400;color:#f0e6d0;letter-spacing:0.04em;margin-bottom:0.3rem; }
    .lock-sub { color:var(--text-muted);font-style:italic;font-size:0.95rem;margin-bottom:2.5rem; }
    #pw-input { width:100%;max-width:280px;background:var(--bg-mid);border:1px solid var(--border);border-radius:14px;padding:0.85rem 1.1rem;color:var(--text-main);font-family:Georgia,serif;font-size:1rem;text-align:center;letter-spacing:0.2em;outline:none;margin-bottom:0.9rem;transition:border-color 0.2s; }
    #pw-input:focus { border-color:var(--gold); }
    #pw-btn { width:100%;max-width:280px;padding:0.85rem;background:linear-gradient(135deg,var(--gold),#b89050);border:none;border-radius:14px;color:#0b1520;font-family:Georgia,serif;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:0.1em;transition:opacity 0.2s; }
    #pw-btn:active { opacity:0.8; }
    #pw-error { color:#e07070;font-size:0.82rem;margin-top:0.8rem;font-style:italic;min-height:1.2rem; }

    /* APP */
    #app { display:none;height:100vh;height:-webkit-fill-available;flex-direction:row; }
    #app.visible { display:flex; }

    /* SIDEBAR */
    #sidebar { width:260px;flex-shrink:0;background:#111e28;border-right:1px solid var(--border);display:flex;flex-direction:column;transition:transform 0.3s ease;z-index:10; }
    #sidebar-header { padding:1.2rem 1rem 0.8rem;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:0.6rem; }
    .app-brand { display:flex;align-items:center;gap:0.6rem; }
    .app-brand .icon { font-size:1.3rem; }
    .app-brand .name { font-size:1.2rem;color:#f0e6d0;font-weight:400;letter-spacing:0.05em; }
    #new-chat-btn { width:100%;padding:0.6rem 0.9rem;background:transparent;border:1px solid var(--gold-dim);border-radius:10px;color:var(--gold);font-family:Georgia,serif;font-size:0.85rem;cursor:pointer;display:flex;align-items:center;gap:0.5rem;transition:all 0.2s;letter-spacing:0.04em; }
    #new-chat-btn:hover { background:#c8a96e10;border-color:var(--gold); }
    #history-label { padding:0.8rem 1rem 0.3rem;font-size:0.65rem;letter-spacing:0.18em;color:var(--text-dim);text-transform:uppercase; }
    #history-list { flex:1;overflow-y:auto;padding:0 0.5rem 1rem; }
    .history-item { padding:0.65rem 0.8rem;border-radius:10px;cursor:pointer;margin-bottom:0.2rem;transition:background 0.15s;border:1px solid transparent; }
    .history-item:hover { background:#1e2d38; }
    .history-item.active { background:#1e2d38;border-color:var(--gold-dim); }
    .h-title { font-size:0.85rem;color:var(--text-main);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:0.2rem; }
    .h-date { font-size:0.7rem;color:var(--text-dim);font-style:italic; }
    .h-delete { float:right;color:#e0707060;font-size:0.75rem;padding:0 0.2rem;line-height:1; }
    .h-delete:hover { color:#e07070; }
    #sidebar-footer { padding:0.8rem 1rem;border-top:1px solid var(--border);font-size:0.65rem;color:var(--text-dim);font-style:italic;text-align:center;line-height:1.5; }

    /* MAIN */
    #main { flex:1;display:flex;flex-direction:column;min-width:0;background:linear-gradient(160deg,#0b1520 0%,#1a2a35 60%,#0b1520 100%); }
    #mobile-bar { display:none;align-items:center;gap:0.8rem;padding:0.9rem 1rem;border-bottom:1px solid var(--border);background:#111e28; }
    #menu-btn { background:transparent;border:none;color:var(--text-muted);font-size:1.3rem;cursor:pointer;padding:0.2rem; }
    #mobile-bar .brand { font-size:1.1rem;color:#f0e6d0; }

    /* CHAT */
    #chat-wrap { flex:1;overflow-y:auto;padding:1.5rem 1rem 0.5rem;display:flex;flex-direction:column;align-items:center; }
    #chat { width:100%;max-width:680px;display:flex;flex-direction:column;gap:1.2rem; }
    .msg-row { display:flex;animation:fadeUp 0.35s ease forwards; }
    .msg-row.user { justify-content:flex-end; }
    .msg-row.assistant { justify-content:flex-start; }
    .avatar { width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#2a3f4f,#3a5060);border:1px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;font-size:0.95rem;flex-shrink:0;margin-right:0.65rem;margin-top:0.15rem; }
    .bubble { max-width:80%;padding:0.9rem 1.1rem;line-height:1.72;font-size:0.96rem;box-shadow:0 3px 18px #00000028; }
    .bubble.user { border-radius:18px 18px 4px 18px;background:linear-gradient(135deg,#2c4a3e,#1e3530);border:1px solid #3a6b5440;color:#b8d4c4; }
    .bubble.assistant { border-radius:4px 18px 18px 18px;background:linear-gradient(160deg,#1e2d38,#243545);border:1px solid var(--border);color:var(--text-main); }
    .bubble p { margin-bottom:0.65rem; }
    .bubble p:last-child { margin-bottom:0; }
    .bubble li { margin-left:1.2rem;margin-bottom:0.3rem;list-style:disc; }
    .bubble strong { color:#e8d8b8; }

    .dots { display:flex;gap:5px;align-items:center;padding:0.2rem 0; }
    .dot { width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay:0.2s; }
    .dot:nth-child(3) { animation-delay:0.4s; }

    #prompts { padding:0.3rem 0 0.5rem; }
    #prompts .label { color:#4a6070;font-size:0.72rem;text-align:center;margin-bottom:0.65rem;letter-spacing:0.1em;text-transform:uppercase; }
    .chips { display:flex;flex-wrap:wrap;gap:0.45rem;justify-content:center; }
    .chip { background:transparent;border:1px solid var(--border);border-radius:20px;padding:0.4rem 0.85rem;color:#7a9ab0;font-size:0.8rem;cursor:pointer;font-family:Georgia,serif;font-style:italic;transition:all 0.2s;line-height:1.3; }
    .chip:hover { border-color:#c8a96e50;color:#a0bcc8; }

    /* INPUT */
    #input-area { padding:0.8rem 1rem 1.2rem;background:linear-gradient(0deg,#0b1520 55%,transparent);display:flex;flex-direction:column;align-items:center; }
    .input-box { width:100%;max-width:680px;display:flex;gap:0.55rem;align-items:flex-end;background:var(--bg-mid);border:1px solid var(--border);border-radius:16px;padding:0.65rem 0.65rem 0.65rem 1rem;box-shadow:0 0 28px #00000045; }
    textarea#user-input { flex:1;background:transparent;border:none;outline:none;color:var(--text-main);font-size:0.96rem;font-family:Georgia,serif;line-height:1.6;resize:none;min-height:26px;max-height:150px;overflow-y:auto; }
    textarea#user-input::placeholder { color:var(--text-dim); }
    #send-btn { width:38px;height:38px;border-radius:11px;border:none;cursor:pointer;flex-shrink:0;font-size:1.15rem;transition:all 0.2s;display:flex;align-items:center;justify-content:center;background:#1a2e40;color:#4a6070; }
    #send-btn.active { background:linear-gradient(135deg,var(--gold),#b89050);color:#0b1520; }
    .disclaimer { font-size:0.68rem;color:#2e4055;margin-top:0.55rem;font-style:italic;text-align:center; }

    #overlay { display:none;position:fixed;inset:0;background:#00000060;z-index:9; }

    @media (max-width:640px) {
      #sidebar { position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%); }
      #sidebar.open { transform:translateX(0); }
      #mobile-bar { display:flex; }
      #overlay.show { display:block; }
    }

    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)} }
    @keyframes pulse { 0%,100%{opacity:0.25;transform:scale(0.75)}50%{opacity:1;transform:scale(1.2)} }
    ::-webkit-scrollbar{width:3px} ::-webkit-scrollbar-thumb{background:#2e4055;border-radius:3px}
    .empty-state{text-align:center;padding:3rem 1rem;color:var(--text-dim);font-style:italic;font-size:0.9rem}
    .empty-state .e-icon{font-size:2.5rem;margin-bottom:1rem;opacity:0.4;display:block}
  </style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-icon">🧭</div>
  <div class="badge">
    <div class="gold-dot"></div>
    <span class="badge-text">Evidence-Based Emotional Support</span>
    <div class="gold-dot"></div>
  </div>
  <h1 class="lock-title">Compass</h1>
  <p class="lock-sub">Navigating life's hardest transitions, together</p>
  <input type="password" id="pw-input" placeholder="Enter your password" autocomplete="current-password" />
  <button id="pw-btn" onclick="checkPassword()">Enter</button>
  <div id="pw-error"></div>
</div>

<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="app-brand"><span class="icon">🧭</span><span class="name">Compass</span></div>
      <button id="new-chat-btn" onclick="newChat()">＋ &nbsp;New Conversation</button>
    </div>
    <div id="history-label">Your Conversations</div>
    <div id="history-list"></div>
    <div id="sidebar-footer">All conversations saved privately<br>on this device only</div>
  </div>

  <div id="overlay" onclick="closeSidebar()"></div>

  <div id="main">
    <div id="mobile-bar">
      <button id="menu-btn" onclick="toggleSidebar()">☰</button>
      <span class="brand">🧭 Compass</span>
    </div>
    <div id="chat-wrap"><div id="chat"></div></div>
    <div id="input-area">
      <div class="input-box">
        <textarea id="user-input" rows="1" placeholder="Share what's on your mind…"></textarea>
        <button id="send-btn" onclick="sendMessage()">↑</button>
      </div>
      <div class="disclaimer">Compass draws from peer-reviewed psychology research · Not a substitute for licensed therapy</div>
    </div>
  </div>
</div>

<script>
const PASSWORD = "Compass2025";

const SYSTEM_PROMPT = `You are a warm, highly skilled therapeutic counselor specializing in midlife transitions, divorce recovery, and new relationships for men over 50. You draw from the research of John Gottman (relationships, trust), Susan Johnson (Emotionally Focused Therapy), Bruce Fisher (Rebuilding: When Your Relationship Ends, 19 rebuilding blocks), Pauline Boss (ambiguous loss), Daniel Levinson (midlife transitions), Bessel van der Kolk (trauma-informed care), and Brene Brown (vulnerability, shame).

Your approach:
- Speak like a skilled, empathetic therapist: warm, unhurried, non-judgmental
- ALWAYS validate feelings before offering guidance
- Ground advice in evidence-based psychology (CBT, EFT, attachment theory, grief models)
- Offer 2-4 concrete, actionable steps when appropriate
- Acknowledge the unique challenges of a 55-year-old man navigating divorce and new relationships
- Ask gentle follow-up questions; never rush to silver linings
- Normalize experiences by citing research when relevant
- Occasionally remind that a licensed therapist can provide deeper support
- IMPORTANT: Past conversation summaries may be provided. Use them to build continuity and reference prior themes when relevant.
The user is a 55-year-old man. Meet him where he is.`;

const WELCOME = `Hello. I'm really glad you're here.

What you're navigating — divorce, the emotional aftermath, and perhaps the uncertain terrain of new relationships at 55 — is one of life's most profound and disorienting experiences. You don't have to carry it alone.

This is a safe space. There's no judgment here, no rush. Share whatever is on your mind — grief, confusion, anger, loneliness, a flicker of hope, or all of the above at once.

**What's weighing on you today?**`;

const STARTERS = [
  "I feel completely lost since the divorce…",
  "I'm scared I'll never find love again",
  "How do I stop feeling angry at my ex?",
  "I started seeing someone new but feel guilty",
  "I don't know who I am anymore",
];

let conversations = [];
let currentId = null;
let loading = false;

function save() { localStorage.setItem("compass_v2", JSON.stringify(conversations)); }
function load() { try { const r = localStorage.getItem("compass_v2"); if(r) conversations=JSON.parse(r); } catch{ conversations=[]; } }
function current() { return conversations.find(c=>c.id===currentId); }

document.getElementById("pw-input").addEventListener("keydown", e=>{ if(e.key==="Enter") checkPassword(); });

function checkPassword() {
  if(document.getElementById("pw-input").value === PASSWORD) {
    document.getElementById("lock-screen").style.display="none";
    document.getElementById("app").classList.add("visible");
    init();
  } else {
    document.getElementById("pw-error").textContent="Incorrect password. Try again.";
    document.getElementById("pw-input").value="";
    document.getElementById("pw-input").focus();
  }
}

function init() {
  load();
  if(conversations.length===0) newChat();
  else { currentId=conversations[0].id; renderSidebar(); renderChat(); }
  setupTextarea();
}

function newChat() {
  const id="c_"+Date.now();
  conversations.unshift({ id, title:"New conversation", date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}), messages:[{role:"assistant",content:WELCOME}] });
  currentId=id; save(); renderSidebar(); renderChat(); closeSidebar();
}

function loadConvo(id) { currentId=id; renderSidebar(); renderChat(); closeSidebar(); }

function deleteConvo(id,e) {
  e.stopPropagation();
  conversations=conversations.filter(c=>c.id!==id);
  if(currentId===id) { if(conversations.length===0) newChat(); else currentId=conversations[0].id; }
  save(); renderSidebar(); renderChat();
}

function fmt(text) {
  return text.split("\n").map(line=>{
    line=line.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/\*(.+?)\*/g,"<em>$1</em>");
    if(line.startsWith("- ")||line.startsWith("• ")) return `<li>${line.slice(2)}</li>`;
    return line?`<p>${line}</p>`:"";
  }).join("");
}

function renderSidebar() {
  const list=document.getElementById("history-list");
  if(conversations.length===0){ list.innerHTML=`<div class="empty-state"><span class="e-icon">🧭</span>No conversations yet</div>`; return; }
  list.innerHTML=conversations.map(c=>`
    <div class="history-item ${c.id===currentId?'active':''}" onclick="loadConvo('${c.id}')">
      <span class="h-delete" onclick="deleteConvo('${c.id}',event)" title="Delete">✕</span>
      <div class="h-title">${c.title}</div>
      <div class="h-date">${c.date}</div>
    </div>`).join("");
}

function renderChat() {
  const chat=document.getElementById("chat");
  const convo=current();
  if(!convo){chat.innerHTML="";return;}
  chat.innerHTML=convo.messages.map((msg,i)=>{
    const prompts=(i===0&&convo.messages.length===1)?`<div id="prompts"><div class="label">Or start with something like…</div><div class="chips">${STARTERS.map(p=>`<button class="chip" onclick="usePrompt('${p.replace(/'/g,"\\'")}')">"${p}"</button>`).join("")}</div></div>`:"";
    if(msg.role==="user") return `<div class="msg-row user"><div class="bubble user">${fmt(msg.content)}</div></div>`;
    return `<div class="msg-row assistant"><div class="avatar">🧭</div><div class="bubble assistant">${fmt(msg.content)}</div></div>${prompts}`;
  }).join("");
  if(loading) chat.innerHTML+=`<div class="msg-row assistant"><div class="avatar">🧭</div><div class="bubble assistant"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>`;
  setTimeout(()=>{ const w=document.getElementById("chat-wrap"); w.scrollTop=w.scrollHeight; },60);
}

function usePrompt(text) { document.getElementById("user-input").value=text; updateBtn(); document.getElementById("user-input").focus(); }

async function sendMessage() {
  const ta=document.getElementById("user-input");
  const text=ta.value.trim();
  if(!text||loading) return;
  const convo=current(); if(!convo) return;
  if(convo.title==="New conversation") { const t=text.trim().replace(/\s+/g," "); convo.title=t.length>38?t.slice(0,38)+"…":t; }
  convo.messages.push({role:"user",content:text});
  ta.value=""; ta.style.height="auto"; updateBtn();
  loading=true; save(); renderSidebar(); renderChat();

  const pastCtx=conversations.filter(c=>c.id!==currentId&&c.messages.length>1).slice(0,4)
    .map(c=>"["+c.date+"] "+c.messages.filter(m=>m.role==="user").map(m=>m.content).join(" | ")).join("\n");
  const sys=pastCtx?SYSTEM_PROMPT+"\n\n--- PAST SESSION SUMMARIES ---\n"+pastCtx+"\n--- END ---":SYSTEM_PROMPT;

  try {
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,
        messages:convo.messages.map(m=>({role:m.role,content:m.content})),
        tools:[{type:"web_search_20250305",name:"web_search"}]})
    });
    const data=await res.json();
    const reply=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n\n");
    convo.messages.push({role:"assistant",content:reply||"I'm here. Please try again."});
  } catch {
    convo.messages.push({role:"assistant",content:"Something went wrong. Please try again — I'm here."});
  }
  loading=false; save(); renderChat();
}

function setupTextarea() {
  const ta=document.getElementById("user-input");
  ta.addEventListener("input",()=>{ ta.style.height="auto"; ta.style.height=Math.min(ta.scrollHeight,150)+"px"; updateBtn(); });
  ta.addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();} });
}
function updateBtn() { document.getElementById("send-btn").classList.toggle("active",document.getElementById("user-input").value.trim().length>0&&!loading); }
function toggleSidebar() { document.getElementById("sidebar").classList.toggle("open"); document.getElementById("overlay").classList.toggle("show"); }
function closeSidebar() { document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").classList.remove("show"); }
</script>
</body>
</html>
